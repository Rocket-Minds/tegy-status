name: Synthetic User Journey

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: synthetic-user-journey
  cancel-in-progress: false

env:
  HAS_SYNTHETIC_SECRETS: ${{ secrets.TEGY_SYNTHETIC_EMAIL != '' && secrets.TEGY_SYNTHETIC_IMAP_HOST != '' && secrets.TEGY_SYNTHETIC_IMAP_USER != '' && secrets.TEGY_SYNTHETIC_IMAP_PASSWORD != '' }}
  HAS_DISCORD_WEBHOOK: ${{ secrets.NOTIFICATION_DISCORD_WEBHOOK_URL != '' }}

jobs:
  user-journey:
    name: Browser signup-to-chat proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check synthetic configuration
        if: ${{ env.HAS_SYNTHETIC_SECRETS != 'true' }}
        run: |
          echo "Skipping synthetic user journey: required TEGY_SYNTHETIC_* IMAP secrets are not configured."

      - name: Checkout
        if: ${{ env.HAS_SYNTHETIC_SECRETS == 'true' }}
        uses: actions/checkout@v6

      - name: Setup Node
        if: ${{ env.HAS_SYNTHETIC_SECRETS == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        if: ${{ env.HAS_SYNTHETIC_SECRETS == 'true' }}
        run: npm ci

      - name: Install Chromium
        if: ${{ env.HAS_SYNTHETIC_SECRETS == 'true' }}
        run: npx playwright install --with-deps chromium

      - name: Run synthetic user journey
        if: ${{ env.HAS_SYNTHETIC_SECRETS == 'true' }}
        run: npm run synthetic:user-journey
        env:
          TEGY_SYNTHETIC_APP_URL: https://app.tegy.io
          TEGY_SYNTHETIC_EMAIL: ${{ secrets.TEGY_SYNTHETIC_EMAIL }}
          TEGY_SYNTHETIC_IMAP_HOST: ${{ secrets.TEGY_SYNTHETIC_IMAP_HOST }}
          TEGY_SYNTHETIC_IMAP_PORT: ${{ secrets.TEGY_SYNTHETIC_IMAP_PORT }}
          TEGY_SYNTHETIC_IMAP_SECURE: ${{ secrets.TEGY_SYNTHETIC_IMAP_SECURE }}
          TEGY_SYNTHETIC_IMAP_USER: ${{ secrets.TEGY_SYNTHETIC_IMAP_USER }}
          TEGY_SYNTHETIC_IMAP_PASSWORD: ${{ secrets.TEGY_SYNTHETIC_IMAP_PASSWORD }}

      - name: Upload synthetic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-user-journey
          path: synthetics/artifacts
          if-no-files-found: ignore

      - name: Send Discord failure alert
        if: failure() && env.HAS_DISCORD_WEBHOOK == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.NOTIFICATION_DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(jq -n --arg run_url "$RUN_URL" '{content: ("Tegy synthetic user journey failed: " + $run_url)}')"
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"
