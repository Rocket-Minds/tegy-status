name: Static Site CI

on:
  workflow_run:
    workflows:
      - Uptime CI
      - Summary CI
      - Graphs CI
      - Setup CI
      - Synthetic User Journey
    types:
      - completed
  push:
    branches:
      - master
    paths:
      - ".github/workflows/site.yml"
      - "scripts/build-status-site.mjs"
      - "package.json"
      - "package-lock.json"
      - "history/**"
  schedule:
    - cron: "7,37 * * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

concurrency:
  group: status-site
  cancel-in-progress: true

jobs:
  publish:
    name: Build and deploy status site
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.name == 'Synthetic User Journey' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build custom status site
        run: npm run build:status-site

      - name: GitHub Pages Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "site-dist"
          force_orphan: true
          user_name: "Tegy Status Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"
