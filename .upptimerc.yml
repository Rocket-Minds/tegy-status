owner: Rocket-Minds
repo: tegy-status

sites:
  - name: Tegy app health
    slug: tegy-app-health
    url: https://app.tegy.io/health
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000
    __dangerous__body_down_if_text_missing: '"ok":true'
  - name: Tegy chat canary
    slug: tegy-chat-canary
    method: POST
    url: https://app.tegy.io/api/status/canary
    headers:
      - "Content-Type: application/json"
      - "X-Tegy-Status-Token: $TEGY_STATUS_CANARY_TOKEN"
    body: "{}"
    expectedStatusCodes:
      - 200
    maxResponseTime: 120000
    __dangerous__body_down_if_text_missing: '"status":"UP"'

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/30 * * * *"

skipDeleteIssues: true

assignees:
  - tornikeo

status-website:
  cname: status.tegy.io
  logoUrl: https://app.tegy.io/favicon.svg
  name: Tegy Status
  introTitle: Tegy service status
  introMessage: Public uptime and synthetic chat-canary status for Tegy.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://app.tegy.io
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

user-agent: Rocket-Minds
