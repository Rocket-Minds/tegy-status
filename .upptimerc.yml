owner: Rocket-Minds
repo: tegy-status

sites:
  - name: Tegy marketing site
    slug: tegy-marketing-site
    url: https://tegy.io/
    icon: https://app.tegy.io/favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000
  - name: Tegy app health
    slug: tegy-app-health
    url: https://app.tegy.io/health
    icon: https://app.tegy.io/favicon.svg
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000
    __dangerous__body_down_if_text_missing: '"ok":true'

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  updates: "0 3 * * *"
  uptime: "*/30 * * * *"

skipDeleteIssues: true

assignees:
  - tornikeo

status-website:
  cname: status.tegy.io
  logoUrl: https://app.tegy.io/favicon.svg
  name: Tegy Status
  introTitle: Tegy service status
  introMessage: Public uptime for Tegy domains. Browser-level product journey checks run separately from GitHub Actions.
  navbar:
    - title: Status
      href: /
    - title: App
      href: https://app.tegy.io
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

user-agent: Rocket-Minds
